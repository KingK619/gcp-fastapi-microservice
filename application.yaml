apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-gitops-deployment
  labels:
    app: fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "webapp-role"
        vault.hashicorp.com/agent-inject-secret-dbpass: "secret/data/webapp/config"
        vault.hashicorp.com/agent-inject-template-dbpass: |
          {{- with secret "secret/data/webapp/config" -}}
          export DB_PASSWORD="{{ .Data.data.db_password }}"
          {{- end -}}
    spec:
      serviceAccountName: webapp-sa
      containers:
      - name: fastapi-container
        image: southamerica-west1-docker.pkg.dev/project-f37a4860-d512-457a-b73/devsecops-docker-repo/fast-api-microservice:v1
        command: ["/bin/sh", "-c"]
        args: [". /vault/secrets/dbpass && uvicorn main:app --host 0.0.0.0 --port 8000"]
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: fastapi
